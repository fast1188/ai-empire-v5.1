name: AI Empire Factory v5.1 Deploy

on:
  schedule:
    # 每天 UTC 02:00 = 北京时间 10:00
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PUSH_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Run v5.1 Engine
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PUSH_TOKEN }}
          ANTHROPIC_AUTH_TOKEN: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python v5_1_empire.py

      - name: Commit & Push (GitHub + Gitee)
        env:
          GITEE_PUSH_TOKEN: ${{ secrets.GITEE_PUSH_TOKEN }}
        run: |
          git config user.name "ai-empire-v5.1"
          git config user.email "deploy@ai.empire"
          # 加 Gitee remote (runner checkout 只有 origin = GitHub)
          git remote add gitee https://wudijia2026:${GITEE_PUSH_TOKEN:-x-access-token}@gitee.com/wudijia2026/ai-empire-v5.1.git
          git add .
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "v5.1 auto: daily generation $(date -u +%Y-%m-%d)"
            # 双推: GitHub + Gitee (B 档必出双仓)
            git push origin main
            git push gitee main || echo "gitee push failed, but github ok"
          fi

      - name: Trigger Vercel Deploy
        if: env.VERCEL_DEPLOY_HOOK != ''
        run: |
          curl -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}" || true
